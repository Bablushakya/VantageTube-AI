<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login | VantageTube AI</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-highest": "#36333e","background": "#14121b","on-surface": "#e6e0ee",
            "surface-container-low": "#1c1a24","outline-variant": "#484555","on-background": "#e6e0ee",
            "primary": "#cabeff","primary-container": "#947dff","on-surface-variant": "#c9c4d8",
            "error": "#ffb4ab","outline": "#938ea1","surface": "#14121b","on-primary-container": "#2a0088",
            "on-primary": "#31009a","surface-container": "#201e28","secondary-container": "#00b4a0",
          },
          spacing: { "lg": "24px","xs": "8px","margin-mobile": "16px","md": "16px","xl": "32px","sm": "12px","base": "4px" },
          fontFamily: { "body-lg": ["Inter"],"label-caps": ["Inter"],"body-sm": ["Inter"],"page-title": ["Poppins"],"section-title": ["Poppins"] },
          fontSize: {
            "body-lg": ["16px", {"lineHeight":"1.6","fontWeight":"400"}],
            "label-caps": ["12px", {"lineHeight":"1","letterSpacing":"0.05em","fontWeight":"600"}],
            "body-sm": ["14px", {"lineHeight":"1.5","fontWeight":"400"}],
            "page-title": ["32px", {"lineHeight":"1.2","letterSpacing":"-0.02em","fontWeight":"600"}],
            "section-title": ["24px", {"lineHeight":"1.3","letterSpacing":"-0.01em","fontWeight":"600"}],
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .glass-card { background: rgba(27,33,64,0.8); backdrop-filter: blur(12px); border: 1px solid rgba(202,190,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.03); }
    .bg-gradient-mesh {
      background: radial-gradient(circle at 0% 0%, #1c1a24 0%, transparent 50%),
                  radial-gradient(circle at 100% 100%, #14121b 0%, transparent 50%),
                  radial-gradient(circle at 50% 50%, #1b2140 0%, #0b1020 100%);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col items-center justify-center bg-gradient-mesh p-margin-mobile">

  <!-- Auth Container -->
  <main class="w-full max-w-[480px]">
    <!-- Brand Identity -->
    <div class="flex flex-col items-center mb-xl">
      <div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center shadow-lg mb-md">
        <span class="material-symbols-outlined text-on-primary-container text-[40px]" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
      </div>
      <h1 class="font-page-title text-page-title text-primary font-bold">VantageTube AI</h1>
      <p class="text-on-surface-variant font-body-sm">The creator's command center.</p>
    </div>

    <!-- Login Card -->
    <div class="glass-card rounded-xl p-xl flex flex-col gap-lg">
      <div class="text-center">
        <h2 class="font-section-title text-section-title text-on-surface mb-xs">Welcome Back</h2>
        <p class="text-on-surface-variant font-body-sm">Sign in to continue to your dashboard</p>
      </div>

      <!-- Google OAuth Button -->
      <button id="googleLoginBtn" class="w-full flex items-center justify-center gap-md bg-primary text-on-primary font-body-lg font-bold py-md px-lg rounded-lg hover:brightness-110 active:scale-[0.98] transition-all duration-200 shadow-[0_0_20px_rgba(202,190,255,0.2)]">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="flex items-center gap-md">
        <div class="h-[1px] flex-1 bg-outline-variant"></div>
        <span class="text-label-caps text-on-surface-variant uppercase">Or with email</span>
        <div class="h-[1px] flex-1 bg-outline-variant"></div>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="flex flex-col gap-md">
        <div id="authError" class="hidden bg-red-900/30 border border-red-500/40 text-red-300 text-sm px-md py-sm rounded-lg"></div>

        <div class="flex flex-col gap-xs">
          <label class="text-label-caps text-on-surface-variant px-base" for="email">EMAIL ADDRESS</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">mail</span>
            <input class="w-full bg-surface-container border border-outline-variant rounded-lg py-sm pl-[48px] pr-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/50" id="email" placeholder="name@vantage.ai" type="email" required/>
          </div>
        </div>

        <div class="flex flex-col gap-xs">
          <div class="flex justify-between items-center px-base">
            <label class="text-label-caps text-on-surface-variant" for="password">PASSWORD</label>
            <a class="text-body-sm text-primary hover:underline" href="#">Forgot Password?</a>
          </div>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">lock</span>
            <input class="w-full bg-surface-container border border-outline-variant rounded-lg py-sm pl-[48px] pr-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/50" id="password" placeholder="••••••••" type="password" required/>
          </div>
        </div>

        <button id="loginBtn" class="w-full mt-base bg-primary-container text-on-primary-container font-body-lg font-bold py-sm rounded-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
          Sign In
        </button>
      </form>

      <!-- Register Tab -->
      <div class="border-t border-outline-variant pt-lg">
        <h3 class="text-center text-sm text-on-surface-variant mb-md">New to VantageTube?</h3>
        <form id="registerForm" class="flex flex-col gap-md hidden">
          <div class="flex flex-col gap-xs">
            <label class="text-label-caps text-on-surface-variant px-base" for="regEmail">EMAIL</label>
            <input class="w-full bg-surface-container border border-outline-variant rounded-lg py-sm px-md text-on-surface focus:outline-none focus:border-primary transition-all" id="regEmail" placeholder="name@email.com" type="email"/>
          </div>
          <div class="flex flex-col gap-xs">
            <label class="text-label-caps text-on-surface-variant px-base" for="regPassword">PASSWORD</label>
            <input class="w-full bg-surface-container border border-outline-variant rounded-lg py-sm px-md text-on-surface focus:outline-none focus:border-primary transition-all" id="regPassword" placeholder="Min. 8 characters" type="password"/>
          </div>
          <button id="registerBtn" class="w-full bg-primary-container text-on-primary-container font-bold py-sm rounded-lg hover:opacity-90 transition-all" type="button">
            Create Account
          </button>
        </form>
        <button id="toggleRegister" class="w-full py-sm border border-outline-variant text-on-surface font-bold rounded-lg hover:bg-surface-container-highest transition-colors text-sm">
          Create an Account
        </button>
      </div>
    </div>

    <!-- Footer Link -->
    <div class="mt-xl text-center">
      <p class="text-on-surface-variant font-body-lg text-sm">
        <a class="text-primary hover:underline" href="index.html">← Back to Home</a>
      </p>
    </div>
  </main>

  <!-- Visual Accents -->
  <div class="fixed bottom-0 left-0 w-full h-[300px] overflow-hidden pointer-events-none -z-10 opacity-30">
    <div class="absolute bottom-[-100px] left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-primary-container/20 blur-[120px] rounded-full"></div>
  </div>

  <script src="js/cookie-manager.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
