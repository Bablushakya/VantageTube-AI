<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting YouTube...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
      overflow: hidden;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 90%;
      z-index: 1000;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 12px;
      color: #333;
    }

    p {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .error-container {
      background: #fee;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: left;
    }

    .error-container h3 {
      color: #c33;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .error-container p {
      color: #666;
      font-size: 0.85rem;
      margin: 0;
      word-break: break-word;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #5568d3;
    }

    .status-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-icon">🔄</div>
    <h2>Connecting your YouTube channel...</h2>
    <p>Please wait while we authenticate your account.</p>
    <div class="spinner"></div>
  </div>

  <script>
    /**
     * Handle YouTube OAuth callback
     * This page is called by Google after user authorizes the app
     */
    async function handleCallback() {
      const container = document.querySelector('.container');
      
      try {
        // Get code and state from URL parameters
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');
        const errorDescription = params.get('error_description');

        console.log('OAuth callback received:', { code: !!code, state: !!state, error, errorDescription });

        // Check for OAuth errors from Google
        if (error) {
          throw new Error(`OAuth error: ${error} - ${errorDescription || 'Unknown error'}`);
        }

        if (!code) {
          throw new Error('No authorization code received from Google. Please try again.');
        }

        if (!state) {
          throw new Error('No user ID in state parameter. Please try again.');
        }

        console.log('OAuth code received, exchanging for tokens...');

        // Call backend exchange endpoint to exchange code for tokens
        const exchangeUrl = `http://localhost:8000/api/youtube/oauth/exchange?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`;
        console.log('Calling exchange URL:', exchangeUrl);

        const response = await fetch(exchangeUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          credentials: 'include'
        });

        console.log('Response status:', response.status);
        console.log('Response headers:', response.headers);

        const data = await response.json();
        console.log('Backend response data:', data);

        if (!response.ok) {
          throw new Error(data.detail || data.message || `OAuth callback failed with status ${response.status}`);
        }

        console.log('OAuth successful, channel connected:', data);

        // Success! Update UI and redirect to dashboard
        container.innerHTML = `
          <div class="status-icon">✅</div>
          <h2>Channel Connected!</h2>
          <p>Your YouTube channel has been successfully connected.</p>
          <p>Redirecting to your dashboard...</p>
        `;

        // Redirect to dashboard after 2 seconds
        setTimeout(() => {
          window.location.href = '/pages/dashboard.html';
        }, 2000);

      } catch (error) {
        console.error('OAuth error:', error);
        console.error('Error stack:', error.stack);

        // Show error UI
        container.innerHTML = `
          <div class="status-icon">❌</div>
          <h2>Connection Failed</h2>
          <div class="error-container">
            <h3>Error Details:</h3>
            <p>${escapeHtml(error.message)}</p>
          </div>
          <p style="color: #666; font-size: 0.85rem; margin-bottom: 16px;">
            Check browser console (F12) for more details.
          </p>
          <button onclick="window.location.href='/pages/dashboard.html'">
            ← Go Back to Dashboard
          </button>
        `;
      }
    }

    /**
     * Escape HTML to prevent XSS
     */
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Start the callback handling when page loads
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', handleCallback);
    } else {
      handleCallback();
    }
  </script>
</body>
</html>
